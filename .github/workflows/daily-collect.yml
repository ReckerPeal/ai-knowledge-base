name: Daily Knowledge Collect

on:
  schedule:
    # UTC 10:00, Beijing 18:00.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    name: Collect and Validate Articles
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BUDGET_YUAN: ${{ vars.BUDGET_YUAN || '1.0' }}
      PLANNER_TARGET_COUNT: ${{ vars.PLANNER_TARGET_COUNT || '20' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run knowledge workflow graph
        run: python -m workflows.graph

      - name: Validate article JSON
        run: |
          mapfile -t article_files < <(
            git status --porcelain --untracked-files=all -- knowledge/articles \
              | sed -E 's/^...//' \
              | awk '/^knowledge\/articles\/[0-9]{4}-[0-9]{2}-[0-9]{2}\/.*\.json$/ {print}' \
              | while IFS= read -r path; do
                  [ -f "$path" ] && printf '%s\n' "$path"
                done \
              | sort
          )
          if [ "${#article_files[@]}" -eq 0 ]; then
            echo "No changed article JSON files to validate."
            exit 0
          fi
          python hooks/validate_json.py "${article_files[@]}"

      - name: Check article quality
        run: |
          mapfile -t article_files < <(
            git status --porcelain --untracked-files=all -- knowledge/articles \
              | sed -E 's/^...//' \
              | awk '/^knowledge\/articles\/[0-9]{4}-[0-9]{2}-[0-9]{2}\/.*\.json$/ {print}' \
              | while IFS= read -r path; do
                  [ -f "$path" ] && printf '%s\n' "$path"
                done \
              | sort
          )
          if [ "${#article_files[@]}" -eq 0 ]; then
            echo "No changed article JSON files to check."
            exit 0
          fi
          python hooks/check_quality.py "${article_files[@]}"

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain -- knowledge/raw knowledge/articles)" ]; then
            echo "No new data to commit."
            exit 0
          fi

          article_count="$(
            git status --porcelain --untracked-files=all -- knowledge/articles \
              | sed -E 's/^...//' \
              | awk '/^knowledge\/articles\/[0-9]{4}-[0-9]{2}-[0-9]{2}\/.*\.json$/ {count++} END {print count+0}'
          )"
          commit_date="$(date -u +%Y-%m-%d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/raw knowledge/articles

          if git diff --cached --quiet; then
            echo "No knowledge data changes to commit."
            exit 0
          fi

          git commit -m "chore: collect ${article_count} articles on ${commit_date}"
          git push
