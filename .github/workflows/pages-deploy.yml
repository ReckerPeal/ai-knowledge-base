name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/articles/index.json'
      - 'docs/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage data into docs/data
        run: |
          mkdir -p docs/data
          if [ -f knowledge/articles/index.json ]; then
            cp knowledge/articles/index.json docs/data/index.json
          else
            echo "[]" > docs/data/index.json
          fi
          ls -lh docs/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
