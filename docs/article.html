<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文章详情 · AI 知识库</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="back-link" href="index.html">← 返回列表</a>
    </div>
  </header>

  <main class="container article-page">
    <div id="status" class="status" role="status">加载中…</div>
    <article id="article" hidden>
      <header class="article-header">
        <h1 id="title"></h1>
        <div class="article-meta">
          <span id="source-badge" class="badge"></span>
          <span id="score-badge" class="badge badge-score"></span>
          <span id="lang-badge" class="badge"></span>
          <span id="date" class="muted"></span>
        </div>
        <div id="tags" class="tag-list"></div>
        <p id="summary" class="lead"></p>
        <div class="article-actions">
          <a id="source-link" target="_blank" rel="noopener" class="btn-primary">打开来源 ↗</a>
        </div>
      </header>

      <section id="metadata" class="metadata-grid"></section>

      <section class="article-content">
        <h2>分析</h2>
        <div id="content" class="prose"></div>
      </section>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="https://github.com/ReckerPeal/ai-knowledge-base" target="_blank" rel="noopener">GitHub 仓库</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <script src="assets/article.js"></script>
</body>
</html>
